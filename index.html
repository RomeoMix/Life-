<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life RPG</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      padding: 20px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    .bar {
      width: 100%;
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .fill {
      height: 100%;
      background: limegreen;
      width: 0%;
    }
  </style>
</head>
<body>

  <h1>Romany - Life RPG</h1>

  <div class="card">
    <h2 id="level">Level: 1</h2>
    <div class="bar">
      <div class="fill" id="xpBar"></div>
    </div>
    <p id="xpText">XP: 0 / 100</p>
  </div>

  <div class="card">
    <h2>Daily Quests</h2>
    <button onclick="gainXP(20)">Gym (+20 XP)</button>
    <button onclick="gainXP(15)">Study (+15 XP)</button>
    <button onclick="gainXP(10)">German (+10 XP)</button>
    <button onclick="gainXP(25)">Work (+25 XP)</button>
  </div>

  <script>
    let xp = parseInt(localStorage.getItem('xp')) || 0;
    let level = parseInt(localStorage.getItem('level')) || 1;

    function updateUI() {
      document.getElementById('level').innerText = "Level: " + level;
      document.getElementById('xpText').innerText = `XP: ${xp} / 100`;
      document.getElementById('xpBar').style.width = xp + "%";
    }

    function gainXP(amount) {
      xp += amount;
      if (xp >= 100) {
        xp -= 100;
        level++;
      }
      localStorage.setItem('xp', xp);
      localStorage.setItem('level', level);
      updateUI();
    }

    updateUI();
  </script>

</body>
</html>
